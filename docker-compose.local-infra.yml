services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm_cloud
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm_cloud"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - crm_local_postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - crm_local_minio_data:/data

volumes:
  crm_local_postgres_data:
  crm_local_minio_data:
