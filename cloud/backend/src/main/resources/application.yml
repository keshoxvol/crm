spring:
  application:
    name: vsz-crm-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:crm_cloud}
    username: ${DB_USER:crm}
    password: ${DB_PASSWORD:crm}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

server:
  port: ${SERVER_PORT:18080}

vk:
  community-token: ${VK_COMMUNITY_TOKEN:}
  community-id: ${VK_COMMUNITY_ID:0}
  callback-secret: ${VK_CALLBACK_SECRET:}
  confirmation-token: ${VK_CONFIRMATION_TOKEN:}

timeweb:
  ai:
    token: ${TIMEWEB_AI_TOKEN:}
    base-url: ${TIMEWEB_AI_AGENT_ID:}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:}

s3:
  endpoint: ${S3_ENDPOINT:}
  access-key: ${S3_ACCESS_KEY:}
  secret-key: ${S3_SECRET_KEY:}
  bucket: ${S3_BUCKET:}
  region: ${S3_REGION:ru-1}

logging:
  level:
    org.apache.catalina.core.ContainerBase: OFF
